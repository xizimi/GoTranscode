global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          # - alertmanager:9093

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'gotranscode'
    static_configs:
      - targets: ['gotranscode-api:8066']
        labels:
          group: 'api'
      - targets: ['gotranscode-worker1:8066']
        labels:
          group: 'worker'
      - targets: ['gotranscode-worker2:8066']
        labels:
          group: 'worker'
    scrape_interval: 10s
    scrape_timeout: 5s

  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis:6379']
    metrics_path: /scrape
    params:
      module: [default]
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: redis-exporter:9121  # Redis exporter address

  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['rabbitmq:15692']  # RabbitMQ Prometheus exporter port